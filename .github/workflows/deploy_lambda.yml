name: Deploy Airflow Pipeline to EC2

on:
  push:
    branches:
      - main # Akan otomatis jalan tiap kali lo nge-push ke branch main

jobs:
  deploy-and-restart:
    runs-on: ubuntu-latest
    steps:
      # 1. GitHub narik kodingan terbaru lo dari Repo
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2. Kirim semua file kodingan lo ke EC2 via SCP
      - name: Copy Files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "." 
          target: "/home/ec2-user/aws-earthquake-pipeline"
          overwrite: true

      # 3. Eksekusi perintah di dalam terminal EC2 secara otomatis!
      - name: Restart Airflow in EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Masuk ke folder project
            cd /home/ec2-user/aws-earthquake-pipeline
            
            # Pastikan izin foldernya bisa dibaca Airflow
            chmod -R 755 .
            
            # Restart Docker Compose biar Airflow baca DAG terbaru
            docker-compose down
            docker-compose up -d
            
            echo "Deploy dan Restart Sukses Bre!"